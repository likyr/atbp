name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.7

  unit-tests:
    runs-on: ubuntu-latest
    needs: actionlint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m pytest tests/test_unit_main.py --alluredir=allure-results
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit
          path: allure-results
          if-no-files-found: ignore

  behave-tests:
    runs-on: ubuntu-latest
    needs: actionlint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m behave -f allure_behave.formatter:AllureFormatter -o allure-results
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-behave
          path: allure-results
          if-no-files-found: ignore

  playwright-tests:
    runs-on: ${{ matrix.os }}
    needs: actionlint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node${{ matrix.node-version }}-modules-${{ hashFiles('package-lock.json') }}

      - if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-node${{ matrix.node-version }}-playwright-${{ hashFiles('package-lock.json') }}

      - if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-node${{ matrix.node-version }}-playwright-${{ hashFiles('package-lock.json') }}

      - if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-node${{ matrix.node-version }}-playwright-${{ hashFiles('package-lock.json') }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - if: runner.os == 'Linux'
        run: npx playwright install --with-deps

      - if: runner.os != 'Linux'
        run: npx playwright install

      - run: npm run test:allure

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright-${{ matrix.os }}-node${{ matrix.node-version }}
          path: allure-results
          if-no-files-found: ignore

  generate-allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, behave-tests, playwright-tests]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g allure-commandline
      - uses: actions/download-artifact@v4
        with:
          path: all-allure-results
          pattern: allure-results-*
          merge-multiple: true
      - run: allure generate all-allure-results -o allure-report --clean
      - if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
      - if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

  telegram-notify:
    runs-on: ubuntu-latest
    needs: [unit-tests, behave-tests, playwright-tests, generate-allure-report]
    if: always()
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_BOT_TOKEN }}
          message: |
            CI status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}