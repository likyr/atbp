name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Node.js (needed for Playwright and Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server in background
        run: |
          nohup python main.py > server.log 2>&1 &
          sleep 10 # Ждем запуска сервера, либо используйте wait-on, если настроен

      - name: Run Tests (Playwright/Cucumber) and generate Allure results
        run: |
          # Замените команду на ту, что используется в вашем проекте для тестов
          pytest --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.python-version }}
          path: allure-results/

  generate-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Добавляем установку Node.js для работы Allure CLI
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Устанавливаем сам генератор отчетов
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results/
          pattern: allure-results-*
          merge-multiple: true

      # Вручную генерируем HTML-отчет из сырых данных
      - name: Generate Allure Report
        run: allure generate all-allure-results/ -o allure-report --clean

      # Публикуем сгенерированную папку (allure-report) на GitHub Pages
      - name: Deploy report to Github Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report